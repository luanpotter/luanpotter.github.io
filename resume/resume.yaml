    theme: harvard
    header:
        connections:
            show_icons: true
    page:
        size: a4
        top_margin: 0.5in
        bottom_margin: 0.5in
        left_margin: 0.5in
        right_margin: 0.5in
        show_footer: false
        show_top_note: false
settings:
    pdf_title: "Luan Nico"
