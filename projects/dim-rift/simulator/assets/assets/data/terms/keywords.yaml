keywords:
  ambush:
    name: "Ambush"
    description: "Can be flipped at [[Fast Speed]]."
    inline: true
    baseEffect:
      type: continuous
      desc: "[Ambush]."
  sidestep:
    name: "Sidestep"
    inlineDescription: "Move to an empty active or inactive adjacent zone."
    description: "Move a creature to an empty adjacent zone (either active or inactive), rotating to desired orientation."
  cleanse:
    name: "Cleanse"
    description: "Clear all conditions from a card."
    inlineDescription: "Clear all conditions."
  scaffold:
    name: "Scaffold"
    description: "Can be sac'ed instead of paying the summoning cost of a monument."
    inline: true
    baseEffect:
      type: continuous
      desc: "[Scaffold]."
  explorer:
    name: "Explorer"
    description: "[this] can target any creature zone you control for its [March] action (including inactive zones)."
    inlineDescription: "Can target any zone to [March]."
    baseEffect:
      type: continuous
      desc: "[Explorer]."
    rulings:
      - "It still must be summoned or set to an active zone."
      - "An inactive zone with this card is still considered inactive."
      - "[this] can be targeted by effects or actions regardless of the activation status of its zone."
  shift:
    name: "Shift"
    description: "Swap [this] with target card of the same type you control."
    faction: fey
  evasive:
    name: "Evasive"
    description: "Can only be blocked by the creature in the zone it is targeting."
    inline: true
    baseEffect:
      type: continuous
      desc: "[Evasive]."
  conduit:
    name: "Conduit"
    description: "A card connected to [this] can use [this] card's arrows for their own targeting."
    baseEffect:
      type: continuous
      desc: "[Conduit]."
    rulings:
      - "Conduit is recursive."
  fading:
    name: "Fading"
    description: "When [this] zone is targeted for a [Strike]: you can choose not to block."
    inline: true
    baseEffect:
      type: trigger
      optional: true
      desc: "[Fading]."
    rulings:
      - "Only when the zone [this] card is in is attacked. This effect is not relevant to Active Blocking."
      - "If you choose to fade; the [Strike] becomes a direct attack and cannot be blocked by any other creature."
  # unaware:
  #   name: "Unaware"
  #   description: "[this] cannot block creatures attacking zones other than its own."
  #   inline: true
  #   baseEffect:
  #     type: continuous
  #     desc: "[Unaware]."
  shadowwalker:
    name: "Shadowwalker"
    description: >
      You can choose another face-down creature you control;
      flip this back face-down and switch their positions.
      You cannot activate more than one Shadowwalker effect per chain.
    baseEffect:
      type: trigger
      optional: true
      desc: "When flipped: [Shadowwalker]."
    rulings:
      - "[this] is not considered to have been summoned or flipped."
      - 'Do not trigger "When summoned" or other "When flipped" effects for [this]'
      - "Do not collect mana for the summon of [this]."
      - "Flip, summon and resolve any associated effects of the chosen replacement."
  transform:
    name: "Transform"
    description: >
      When the transform condition is met, you must immediately resolve:
      "Sac [this]: you can summon from your [[Fables Deck]] a [Transformed] creature."
    rulings:
      - "As with any triggers, this happens at [[Fast Speed]], regardless of phase or turn."
      - "This does not count as your one [[Fabled]] summon during [[Deployment]]."
  transformed:
    name: "Transformed"
    description: "Can only be summoned using a [Transform] effect."
    rulings:
      - "As with any triggers, this happens at [[Fast Speed]], regardless of phase or turn."
      - "This does not count as your one [[Fabled]] summon during [[Deployment]]."
  re_target:
    name: "Re-target"
    description: >
      When this card is targeted; immediately before that effect/attack resolves:
      choose a new valid target zone using [this]'s arrows.
    baseEffect:
      type: trigger
      optional: false
      desc: "[Re-target]."
