cards:
  dimwitted_forest_dweller:
    name: Dimwitted Forest Dweller
    faction: fey
    type: creature
    subType: fey
    stats:
      might: 1
      life: 2
    effects:
      - type: trigger
        optional: false
        desc: "When flipped: [Sidestep] [this]."
      - type: action
        desc: "Move one mana from target to [this]."
      - type: trigger
        optional: false
        desc: "When [this] has 3 or more mana: [Transform] [this]."
    arrows:
      top: single
      left: double
      right: double
  poetic_ranger:
    name: Poetic Ranger
    faction: fey
    type: creature
    subType: fey
    flavor: |
      The tips of his arrows were as sharp as his words.
    stats:
      might: 1
      life: 3
    effects:
      - action: strike
      - type: trigger
        optional: false
        desc: "When [this] has fought with 2 different creatures: [Transform] [this]."
      - type: continuous
        desc: "Can only target a creature for a [Strike] if that creature has fought with [this] before."
    arrows:
      topRight: single
      topLeft: single
      bottomLeft: single
      bottomRight: single
  renowned_hunter:
    name: Renowned Hunter
    faction: fey
    type: creature
    subType: fey
    stats:
      might: 1
      will: 1
      life: 3
    effects:
      - type: trigger
        optional: false
        desc: "When [this] is targeted a second time by your opponent, after that effect resolves: [Transform] [this]."
      - type: activation
        oncePerTurn: true
        desc: "Consume 1 mana: deal 1 damage to target creature."
    arrows:
      top: double
      topRight: single
      topLeft: single
      left: single
      right: single
  elder_druid:
    name: Elder Druid
    faction: fey
    type: creature
    subType: fey
    stats:
      might: 2
      life: 2
      will: 2
    effects:
      - type: trigger
        optional: false
        desc: "When it's the 2nd start of your turn since [this] was summoned: [Transform] [this]."
      - keyword: evasive
      - type: activation
        oncePerTurn: false
        desc: "Consume 1 mana: target collects 1 mana."
      - type: trigger
        optional: false
        desc: "When [this] has zero mana: destroy [this]."
    arrows:
      top: single
      left: single
      right: single
  gatherer_of_dreams:
    name: Gatherer of Dreams
    faction: fey
    type: creature
    subType: fey
    flavor: |
      Not only was she floating in dreams like dandelions;
      she could gather the Fey to fulfill them.
    stats:
      life: 4
    effects:
      - type: trigger
        optional: false
        desc: "When flipped: target is [Inspired]."
      - action: conscript
      - type: trigger
        optional: false
        desc: "When connected to at least 3 Creature Tokens: [Transform] [this]."
    arrows:
      top: single
      left: double
      right: double
  reluctant_poacher:
    name: Reluctant Poacher
    faction: fey
    type: creature
    subType: fey
    stats:
      might: 2
      life: 1
      will: 1
    effects:
      - action: march
      - keyword: explorer
      - type: trigger
        optional: false
        desc: "When [this] has visited all your creature zones: [Transform] [this]."
      - type: activation
        oncePerTurn: true
        desc: "Consume any 1 mana: [Shift]."
    arrows:
      left: double
      right: double
  woodland_courier:
    name: Woodland Courier
    faction: fey
    type: creature
    subType: human
    stats:
      might: 1
      life: 1
      will: 1
    effects:
      - action: march
      - type: activation
        oncePerTurn: true
        desc: "[Shift]."
      - type: trigger
        optional: false
        desc: "When [this] moves: target creature is [Prone]."
    arrows:
      topRight: single
      topLeft: single
      left: single
      right: single
  rampaging_boar:
    name: Rampaging Boar
    faction: fey
    type: creature
    subType: beast
    stats:
      might: 1
      life: 2
    effects:
      - action: strike
      - type: trigger
        optional: false
        desc: "When [this] declares a [Strike] against target creature; chose an attachment from target: destroy that attachment."
    arrows:
      top: double
  savage_hyena:
    name: Savage Hyena
    faction: fey
    type: creature
    subType: beast
    stats:
      might: 3
      life: 1
    effects:
      - action: march
      - keyword: explorer
      - type: trigger
        optional: true
        desc: "When [this] [March | Marches]: you can destroy target artifact with no mana."
    arrows:
      top: double
      left: single
      right: single
  cunning_fox:
    name: Cunning Fox
    faction: fey
    type: creature
    subType: beast
    stats:
      might: 1
      life: 1
    effects:
      - type: trigger
        optional: true
        desc: "When summoned: you can deal 3 damage to target [Prone] creature."
      - action: strike
      - keyword: evasive
    arrows:
      top: single
      left: single
      right: single
      bottomRight: single
      bottomLeft: single
  hidden_mole:
    name: Hidden Mole
    faction: fey
    type: creature
    subType: beast
    stats:
      might: 2
      life: 2
    effects:
      - keyword: ambush
      - type: trigger
        optional: false
        desc: "When summoned: target creature is [Prone]."
      - type: action
        desc: "[Shift]."
    arrows:
      top: single
      left: single
      right: single
  call_of_the_wild:
    name: Call of the Wild
    faction: fey
    type: artifact
    subType: scroll
    flavor: |
      No Fey could resist hearing the unmistakable call of Nature herself.
    stats:
      will: 3
    effects:
      - type: trigger
        optional: false
        desc: "When summoned; sac two creatures: [Transform] target creature with [Transform]; the transformation is [Prone]."
    arrows:
      top: single
      topRight: single
      topLeft: single
  serenade_of_the_forest:
    name: Serenade of the Forest
    faction: fey
    type: artifact
    subType: scroll
    flavor: |
      The dulcet tones echoed through the forest,
      as if sang by Mother Nature herself.
    stats:
      will: 1
    effects:
      - type: trigger
        optional: false
        desc: "When summoned: target creature is [Protected] until the end of the turn; it collects 1 mana."
    arrows:
      topRight: single
      topLeft: single
  violent_winds:
    name: Violent Winds
    faction: fey
    type: artifact
    subType: scroll
    stats:
      will: 2
    effects:
      - type: trigger
        optional: false
        desc: >
          When summoned; target all connected creatures: for each target, it is [Prone]; or if it was already [Prone], it is also [Weakened].
    arrows:
      topRight: single
      top: double
      topLeft: single
  morning_dew:
    name: Morning Dew
    faction: fey
    type: artifact
    subType: scroll
    stats:
      will: 1
    effects:
      - type: trigger
        optional: false
        desc: |
          When summoned; target all connected face-up creatures; for each target, chose either:
          (1) [Cleanse] it;
          (2) heal 2 damage; or
          (3) collect 3 mana.
    arrows:
      top: double
    rulings:
      - "You must declare all targets and the choice for each on activation."
  forest_whispers:
    name: Forest Whispers
    faction: fey
    type: artifact
    subType: scroll
    flavor: |
      If you ignore the whispers, you might find yourself dead.
      If you listen to them, you might find yourself mad.
    stats:
      will: 2
    effects:
      - type: trigger
        optional: false
        desc: "When summoned: [Sidestep] target; if you did, it is [Suppressed]."
    arrows:
      top: double
  verdant_burst:
    name: Verdant Burst
    faction: fey
    type: artifact
    subType: scroll
    effects:
      - type: trigger
        optional: false
        desc: "When summoned: deal 2 damage to all connected face-up creatures and collect 2 mana on all connected face-up artifacts."
    arrows:
      top: double
      topRight: single
      topLeft: single
  amulet_of_natures_purity:
    name: Amulet of Nature's Purity
    faction: fey
    type: artifact
    subType: equipment
    stats:
      life: 2
    effects:
      - type: trigger
        optional: false
        desc: "When summoned: target creature is [Inspired] until the end of the turn."
      - action: equip
      - type: activation
        oncePerTurn: false
        transfer: true
        desc: "[Cleanse] [this]."
    arrows:
      topRight: single
      top: single
      topLeft: single
  tiny_tree_house:
    name: Tiny Tree House
    faction: fey
    type: monument
    flavor: |
      "They met in a tiny tree house, in which Theranor could barely fit. Luckily the atmosphere was amiable, so the paladins felt comfortable doffing their bulky outfits." — _A Brief History of Altaria_, p. 34
    effects:
      - keyword: scaffold
      - type: continuous
        desc: 'All creatures have: "[Explorer]".'
      - type: activation
        oncePerTurn: false
        desc: "Sac an artifact: chosen face-up creature is [Prone]."
  secluded_fey_pond:
    name: Secluded Fey Pond
    faction: fey
    type: monument
    flavor: |
      The big-lettered "FEY ONLY" on the sign had to later be prefixed with "non-transformed".
    effects:
      - keyword: scaffold
      - type: continuous
        desc: 'All creatures have: "[Evasive]."'
      - type: activation
        oncePerTurn: false
        desc: "Sac an artifact: heal 1 damage from chosen face-up creature."
  the_lone_wolf:
    name: The Lone Wolf
    faction: fey
    extra: true
    type: creature
    subType: feyBeast
    stats:
      might: 3
      life: 3
      will: 1
    effects:
      - type: cost
        desc: "[Transformed]: summon."
      - type: trigger
        optional: false
        desc: "When summoned: [Sidestep] target creature."
      - action: strike
      - type: activation
        oncePerTurn: false
        desc: "Discard a card: target is [Weakened]."
    arrows:
      top: single
      topRight: single
      topLeft: single
      bottom: double
  the_mighty_bear:
    name: The Mighty Bear
    faction: fey
    extra: true
    type: creature
    subType: feyBeast
    stats:
      might: 4
      life: 4
      will: 1
    effects:
      - type: cost
        desc: "[Transformed]: summon."
      - action: march
    arrows:
      top: double
      topRight: single
      topLeft: single
      left: single
      right: single
  zion_and_shawarma_formidable_rats:
    name: Zion & Shawarma, Formidable Rats
    faction: fey
    extra: true
    type: creature
    subType: feyBeast
    flavor: |
      One would be eternally grateful for the honor of
      having met these incredible creatures.
    stats:
      might: 2
      life: 4
      will: 2
    effects:
      - type: cost
        desc: "[Transformed]: summon."
      - type: continuous
        desc: "[Inspired]."
      - type: action
        name: "Tail Whip"
        desc: "Consume 1 mana: all connected face-up creatures are [Prone]."
      - type: activation
        oncePerTurn: false
        name: "Shred"
        desc: "Destroy up to 3 target Scrolls: [this] collects 1 mana for each."
    arrows:
      top: single
      topRight: single
      topLeft: single
      bottom: double
  the_soaring_eagle:
    name: The Soaring Eagle
    faction: fey
    extra: true
    type: creature
    subType: feyBeast
    stats:
      might: 1
      life: 1
      will: 1
    effects:
      - type: cost
        desc: "[Transformed]: summon."
      - keyword: re_target
      - action: march
      - type: continuous
        desc: "While a creature does not connect to [this] it cannot deal damage when blocking [Strike | Strikes] from [this]."
    arrows:
      top: double
      topRight: single
      topLeft: single
      left: double
      right: double
      bottom: double
      bottomRight: single
      bottomLeft: single
  unavoidable_tremors:
    name: Unavoidable Tremors
    faction: fey
    extra: true
    type: artifact
    subType: scroll
    flavor: |
      It was as if the entire forest was suddenly awake. And she was _not_ happy.
    effects:
      - type: cost
        desc: "Sac at least 1 artifacts: summon."
      - type: trigger
        optional: false
        desc: "When summoned: all face-up creatures are [Prone]."
  deep_forest_temple:
    name: Deep Forest Temple
    faction: fey
    extra: true
    type: monument
    effects:
      - type: cost
        desc: "Consume any 2 mana and sac 3 cards: summon."
      - type: continuous
        desc: "[Prone] creatures are [Weakened]."
      - type: continuous
        desc: "[Prone] creatures with [Transform] can [Transform] at the end of each turn."
  mother_nature:
    name: Mother Nature
    faction: fey
    extra: true
    type: creature
    subType: manifestation
    flavor: |
      "I am all nature; nature is but me."
    stats:
      might: 5
      will: 3
      life: 7
    effects:
      - type: cost
        desc: "Sac 3 [Prone] creatures: summon."
      - type: continuous
        desc: "[Inspired]."
      - type: activation
        oncePerTurn: false
        desc: "Consume any 3 mana: [Transform] target creature with [Transform]."
      - type: activation
        oncePerTurn: false
        desc: "Consume any 3 mana: deal 3 damage to target [Prone] creature."
    arrows:
      top: single
      topRight: single
      topLeft: single
      left: single
      right: single
      bottom: single
      bottomRight: single
      bottomLeft: single
