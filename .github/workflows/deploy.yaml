name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.30"

      - name: Provision resume venv
        run: uv sync --project resume --frozen

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt

      - name: Install actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Install cspell and markdownlint
        run: bun install -g cspell@10.0.0 markdownlint-cli@0.48.0

      - name: Install dependencies
        run: bun install

      - name: Build site
        run: ./scripts/build.sh

      - name: Copy projects to dist
        run: |
          cp -r projects/* dist/projects/
          echo "Total projects copied: $(find projects -maxdepth 1 -type d | wc -l)"
          echo "Total files in dist: $(find dist -type f | wc -l)"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
