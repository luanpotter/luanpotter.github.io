name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    lint:
        name: Lint & Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Setup Python
              uses: actions/setup-python@v7
              with:
                  python-version: "3.13"

            - name: Setup uv
              uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
              with:
                  version: "0.11.30"

            - name: Provision resume venv
              run: uv sync --project resume --frozen

            - name: Install shellcheck
              run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt

            - name: Install actionlint
              run: |
                  bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
                  echo "$PWD" >> "$GITHUB_PATH"

            - name: Install cspell and markdownlint
              run: bun install -g cspell@10.0.0 markdownlint-cli@0.48.0

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run all checks
              run: ./scripts/lint.sh
